CONFIG_PRINTK=y

CONFIG_IPC_SERVICE=y
CONFIG_IPC_SERVICE_BACKEND_ICMSG=y
CONFIG_MBOX=y

CONFIG_ASSERT=y
CONFIG_HUBBLE_BLE_NETWORK=y
CONFIG_HUBBLE_SAT_NETWORK=y
# CONFIG_LOG=y

# DEBUG
# CONFIG_HUBBLE_SAMPLE_DEBUG=y

CONFIG_BT=y
CONFIG_BT_BUF_ACL_TX_COUNT=7
CONFIG_BT_SMP=y
CONFIG_BT_PERIPHERAL=y
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

CONFIG_BT_DEVICE_NAME="Hubble Network"

CONFIG_BASE64=y


# Enable MCUmgr and dependencies.
# CONFIG_NET_BUF=y
# CONFIG_ZCBOR=y
# CONFIG_CRC=y
# CONFIG_STREAM_FLASH=y
# CONFIG_FLASH_MAP=y

# Some command handlers require a large stack.
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2304
CONFIG_MAIN_STACK_SIZE=2048

# Enable flash operations.
CONFIG_FLASH=y

# Enable most core commands.
CONFIG_NVS=y
CONFIG_FLASH_PAGE_LAYOUT=y


# Shell - Minimize options
CONFIG_SHELL=y
CONFIG_SHELL_PROMPT_UART="HubbleNetwork:~$ "
CONFIG_DEVICE_SHELL=n
CONFIG_DEVICE_SHELL_INIT_CMD=n
CONFIG_DATE_SHELL=n
CONFIG_DEVMEM_SHELL=n
CONFIG_APP_VERSION_SHELL=n
CONFIG_KERNEL_SHELL=n
CONFIG_SHELL_STATS=n
CONFIG_SHELL_CMDS=n
CONFIG_SHELL_CMDS_RESIZE=n

# Sensor
CONFIG_SENSOR=y
CONFIG_SENSOR_INFO=y

CONFIG_BME680=y

# Banner
CONFIG_BOOT_BANNER_STRING="Hubble Network Thingy53"

# GPIO for button
CONFIG_GPIO=y
